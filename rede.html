<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SepLab — Acesso pela Rede</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #080b0a; color: #dff0e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    background: #111714;
    border: 1px solid #243028;
    border-radius: 16px;
    padding: 36px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .logo { font-size: 22px; font-weight: 900; letter-spacing: 3px; color: #dff0e8; margin-bottom: 4px; }
  .logo span { color: #2ecc8a; }
  .sub { font-size: 11px; color: #6b8a76; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
  .qr-wrap {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 20px;
    box-shadow: 0 0 24px rgba(46,204,138,.15);
  }
  .url-box {
    background: #0d1210;
    border: 1px solid #2ecc8a;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: bold;
    color: #2ecc8a;
    letter-spacing: 1px;
    margin-bottom: 10px;
    word-break: break-all;
  }
  .info { font-size: 12px; color: #6b8a76; line-height: 1.6; margin-bottom: 20px; }
  .btn {
    display: inline-block;
    background: #2ecc8a;
    color: #050e09;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 11px 28px;
    border-radius: 7px;
    text-decoration: none;
    transition: background .15s;
    border: none;
    cursor: pointer;
  }
  .btn:hover { background: #1aff99; }
  .status { font-size: 11px; color: #6b8a76; margin-top: 16px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #2ecc8a; box-shadow: 0 0 6px #2ecc8a; margin-right: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>
<div class="card">
  <div class="logo">TOOLING <span>|</span> SEP<span>LAB</span></div>
  <div class="sub">Acesso pela Rede Local</div>

  <div class="qr-wrap">
    <canvas id="qrCanvas"></canvas>
  </div>

  <div class="url-box" id="urlBox">Carregando...</div>
  <div class="info">
    Aponte a câmera do celular para o QR Code<br>
    ou acesse o endereço acima em qualquer<br>
    dispositivo conectado ao mesmo Wi-Fi.
  </div>

  <a class="btn" id="btnAbrir" href="#">Abrir no Navegador</a>

  <div class="status"><span class="dot"></span>Servidor ativo</div>
</div>

<script>
async function init() {
  try {
    const r = await fetch('/api/network-info');
    const { ip, port, url } = await r.json();
    const fullUrl = url + '/separacao-pedidos_1.html';

    document.getElementById('urlBox').textContent = fullUrl;
    document.getElementById('btnAbrir').href = fullUrl;

    QRCode.toCanvas(document.getElementById('qrCanvas'), fullUrl, {
      width: 220,
      margin: 1,
      color: { dark: '#080b0a', light: '#ffffff' }
    });
  } catch (e) {
    document.getElementById('urlBox').textContent = 'Erro ao carregar IP da rede';
  }
}
init();
</script>
</body>
</html>
