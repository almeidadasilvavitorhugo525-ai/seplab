<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SepLab — Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b0a; --bg2:#0d1210; --surface:#111714; --surface2:#182019; --surface3:#1e2a22;
  --border:#243028; --border2:#2e3d32;
  --green:#2ecc8a; --green2:#1aff99; --green-dim:#1a7a52; --green-glow:rgba(46,204,138,.15);
  --text:#dff0e8; --muted:#6b8a76; --warn:#f0a500; --danger:#e05555; --radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* LOGIN */
#login-overlay{position:fixed;inset:0;background:#080b0a;z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px 36px;width:100%;max-width:340px;text-align:center;box-shadow:0 12px 50px rgba(0,0,0,.7);}
.login-logo svg{width:56px;height:56px;margin:0 auto 16px;}
.login-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;letter-spacing:3px;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.login-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:13px;font-size:24px;text-align:center;outline:none;letter-spacing:8px;transition:border .2s;margin-bottom:10px;}
.login-input:focus{border-color:var(--green-dim);}
.login-err{color:var(--danger);font-size:12px;min-height:18px;margin-bottom:8px;}
.login-btn{width:100%;background:var(--green);color:#050e09;border:none;border-radius:8px;padding:14px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:2px;cursor:pointer;transition:background .15s;}
.login-btn:hover{background:var(--green2);}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.4);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:2px;color:var(--text);text-transform:uppercase;}
.logo-text span{color:var(--green);}
.logo-divider{width:1px;height:22px;background:var(--border2);margin:0 8px;}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
#status-msg{font-size:12px;color:var(--green);transition:opacity .3s;}

/* LAYOUT */
main{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;position:relative;overflow:hidden;}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green);opacity:.25;}
.stat.hl::after{opacity:1;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;color:var(--text);margin-bottom:4px;}
.stat.hl .stat-num{color:var(--green);}
.stat-warn .stat-num{color:var(--warn);}
.stat-danger .stat-num{color:var(--danger);}
.stat-label{font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:9px 12px 9px 36px;font-size:14px;outline:none;transition:border .2s;}
.search-wrap input:focus{border-color:var(--green-dim);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.filter-chips{display:flex;gap:6px;}
.chip{padding:6px 14px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;}
.chip:hover{color:var(--text);border-color:var(--border2);}
.chip.active{background:var(--green);color:#050e09;border-color:var(--green);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--green);color:#050e09;}
.btn-primary:hover{background:var(--green2);}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:14px;}
thead th{background:var(--surface2);color:var(--muted);padding:11px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:12px 14px;color:var(--text);}
.td-code{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--muted);}
.td-desc{font-weight:500;}
.td-cat{font-size:12px;color:var(--muted);}
.td-qty{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.8px;text-transform:uppercase;}
.badge-ok{background:rgba(46,204,138,.1);color:var(--green);}
.badge-low{background:rgba(240,165,0,.1);color:var(--warn);}
.badge-out{background:rgba(224,85,85,.1);color:var(--danger);}
.td-actions{display:flex;gap:6px;}
.btn-edit{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;}
.btn-edit:hover{color:var(--green);border-color:var(--green-dim);}
.btn-del{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;}
.btn-del:hover{color:var(--danger);border-color:rgba(224,85,85,.4);}
.empty{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-icon{font-size:40px;display:block;margin-bottom:12px;opacity:.4;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:8px 20px 40px;animation:slideUp .2s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-drag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 16px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.5px;}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;}
.modal-close:hover{color:var(--text);}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:10px 12px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border .2s;}
.form-input:focus{border-color:var(--green-dim);}
.form-input::placeholder{color:var(--border2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:8px;margin-top:4px;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border2);flex:1;}
.btn-ghost:hover{background:var(--surface3);}

@media(min-width:600px){
  .modal-overlay{align-items:center;}
  .modal{border-radius:14px;max-height:82vh;}
  .modal-drag{display:none;}
}
@media(max-width:700px){
  .stats{grid-template-columns:repeat(2,1fr);}
  thead th:nth-child(3), td:nth-child(3),
  thead th:nth-child(5), td:nth-child(5){display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="60" height="60" rx="10" fill="#0d1a14"/>
        <circle cx="26" cy="20" r="7" stroke="#2ecc8a" stroke-width="2.2" fill="none"/>
        <path d="M12 44 Q14 32 26 32 Q38 32 40 44" stroke="#2ecc8a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <path d="M38 14 L48 24 L44 28" stroke="#2ecc8a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
      </svg>
    </div>
    <div class="login-title">SEP<span style="color:var(--green)">LAB</span></div>
    <div class="login-sub">Controle de Estoque</div>
    <input class="login-input" id="senha-input" type="password" placeholder="••••"
      onfocus="this.style.borderColor='var(--green-dim)'"
      onblur="this.style.borderColor='var(--border)'"
      onkeydown="if(event.key==='Enter')verificarSenha()">
    <div class="login-err" id="senha-erro"></div>
    <button class="login-btn" onclick="verificarSenha()">ENTRAR</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <svg width="32" height="32" viewBox="0 0 60 60" fill="none">
      <rect width="60" height="60" rx="8" fill="#0d1a14"/>
      <circle cx="26" cy="20" r="7" stroke="#2ecc8a" stroke-width="2.2" fill="none"/>
      <path d="M12 44 Q14 32 26 32 Q38 32 40 44" stroke="#2ecc8a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M38 14 L48 24 L44 28" stroke="#2ecc8a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
    </svg>
    <span class="logo-text">SEP<span>LAB</span></span>
    <div class="logo-divider"></div>
    <span class="logo-sub">Estoque</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span id="status-msg"></span>
    <button class="btn btn-primary" onclick="abrirModal()">+ Novo Item</button>
  </div>
</header>

<main>
  <!-- STATS -->
  <div class="stats" id="stats"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="busca" placeholder="Buscar por código ou descrição..." oninput="renderTabela()">
    </div>
    <div class="filter-chips">
      <button class="chip active" onclick="setFiltro('todos',this)">Todos</button>
      <button class="chip" onclick="setFiltro('ok',this)">✅ OK</button>
      <button class="chip" onclick="setFiltro('baixo',this)">⚠️ Baixo</button>
      <button class="chip" onclick="setFiltro('sem',this)">❌ Zerado</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Categoria</th>
          <th>Qtd</th>
          <th>Mínimo</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
    <div id="vazio" class="empty" style="display:none">
      <span class="empty-icon">📦</span>
      Nenhum item encontrado.
    </div>
  </div>
</main>

<!-- MODAL NOVO / EDITAR -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Novo Item</div>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Código</label>
      <input class="form-input" id="f-codigo" placeholder="ex: EL-001">
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-input" id="f-descricao" placeholder="Nome do item">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Quantidade</label>
        <input class="form-input" id="f-quantidade" type="number" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Estoque Mínimo</label>
        <input class="form-input" id="f-minimo" type="number" min="0" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-input" id="f-categoria">
        <option value="">Selecione...</option>
        <option>Eletrônico</option>
        <option>Mecânico</option>
        <option>Consumível</option>
        <option>Ferramenta</option>
        <option>Outro</option>
      </select>
    </div>
    <input type="hidden" id="f-id">
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="salvar()">Salvar Item</button>
    </div>
  </div>
</div>

<script>
let dados = { itens: [] };
let filtroAtivo = 'todos';

async function carregar() {
  try {
    const r = await fetch('/api/data');
    const d = await r.json();
    if (d && d.itens) dados = d;
    else dados = { itens: [] };
  } catch { dados = { itens: [] }; }
  renderStats();
  renderTabela();
}

async function salvarDados() {
  try {
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });
    mostrarStatus('Salvo');
  } catch { mostrarStatus('Erro ao salvar', true); }
}

function salvar() {
  const id    = document.getElementById('f-id').value;
  const codigo = document.getElementById('f-codigo').value.trim();
  const desc   = document.getElementById('f-descricao').value.trim();
  if (!codigo || !desc) { alert('Preencha código e descrição.'); return; }
  const item = {
    id: id || Date.now().toString(),
    codigo,
    descricao: desc,
    quantidade: parseInt(document.getElementById('f-quantidade').value) || 0,
    minimo:     parseInt(document.getElementById('f-minimo').value) || 0,
    categoria:  document.getElementById('f-categoria').value || 'Outro'
  };
  if (id) {
    const idx = dados.itens.findIndex(i => i.id === id);
    if (idx >= 0) dados.itens[idx] = item;
  } else {
    dados.itens.push(item);
  }
  salvarDados();
  fecharModal();
  renderStats();
  renderTabela();
}

function editar(id) {
  const item = dados.itens.find(i => i.id === id);
  if (!item) return;
  document.getElementById('modal-titulo').textContent = 'Editar Item';
  document.getElementById('f-id').value        = item.id;
  document.getElementById('f-codigo').value    = item.codigo;
  document.getElementById('f-descricao').value = item.descricao;
  document.getElementById('f-quantidade').value = item.quantidade;
  document.getElementById('f-minimo').value    = item.minimo;
  document.getElementById('f-categoria').value = item.categoria;
  document.getElementById('modal').classList.add('open');
}

function remover(id) {
  if (!confirm('Remover este item do estoque?')) return;
  dados.itens = dados.itens.filter(i => i.id !== id);
  salvarDados();
  renderStats();
  renderTabela();
}

function abrirModal() {
  document.getElementById('modal-titulo').textContent = 'Novo Item';
  ['f-id','f-codigo','f-descricao','f-quantidade','f-minimo'].forEach(x => document.getElementById(x).value = '');
  document.getElementById('f-categoria').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-codigo').focus(), 150);
}

function fecharModal() {
  document.getElementById('modal').classList.remove('open');
}

function setFiltro(f, el) {
  filtroAtivo = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderTabela();
}

function getStatus(item) {
  if (item.quantidade === 0) return 'sem';
  if (item.quantidade <= item.minimo) return 'baixo';
  return 'ok';
}

function renderTabela() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const tbody = document.getElementById('tabela');
  const vazio = document.getElementById('vazio');

  let lista = dados.itens.filter(i => {
    const match = i.codigo.toLowerCase().includes(busca) || i.descricao.toLowerCase().includes(busca);
    if (!match) return false;
    if (filtroAtivo === 'todos') return true;
    return getStatus(i) === filtroAtivo;
  });

  if (!lista.length) {
    tbody.innerHTML = '';
    vazio.style.display = '';
    return;
  }
  vazio.style.display = 'none';

  tbody.innerHTML = lista.map(i => {
    const st = getStatus(i);
    const badge = st === 'ok'
      ? '<span class="badge badge-ok">● OK</span>'
      : st === 'baixo'
      ? '<span class="badge badge-low">▲ Baixo</span>'
      : '<span class="badge badge-out">✕ Zerado</span>';
    return `<tr>
      <td><span class="td-code">${i.codigo}</span></td>
      <td><span class="td-desc">${i.descricao}</span></td>
      <td><span class="td-cat">${i.categoria}</span></td>
      <td><span class="td-qty" style="color:${st==='ok'?'var(--green)':st==='baixo'?'var(--warn)':'var(--danger)'}">${i.quantidade}</span></td>
      <td style="color:var(--muted);font-size:13px">${i.minimo}</td>
      <td>${badge}</td>
      <td><div class="td-actions">
        <button class="btn-edit" onclick="editar('${i.id}')">Editar</button>
        <button class="btn-del" onclick="remover('${i.id}')">Remover</button>
      </div></td>
    </tr>`;
  }).join('');
}

function renderStats() {
  const total  = dados.itens.length;
  const ok     = dados.itens.filter(i => getStatus(i) === 'ok').length;
  const baixo  = dados.itens.filter(i => getStatus(i) === 'baixo').length;
  const sem    = dados.itens.filter(i => getStatus(i) === 'sem').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total de Itens</div></div>
    <div class="stat hl"><div class="stat-num">${ok}</div><div class="stat-label">Em Estoque</div></div>
    <div class="stat stat-warn"><div class="stat-num">${baixo}</div><div class="stat-label">Estoque Baixo</div></div>
    <div class="stat stat-danger"><div class="stat-num">${sem}</div><div class="stat-label">Sem Estoque</div></div>`;
}

function mostrarStatus(msg, erro = false) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.color = erro ? 'var(--danger)' : 'var(--green)';
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function verificarSenha() {
  if (document.getElementById('senha-input').value === '1001') {
    document.getElementById('login-overlay').style.display = 'none';
  } else {
    const err = document.getElementById('senha-erro');
    err.textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('senha-input').value = '';
    document.getElementById('senha-input').focus();
    setTimeout(() => err.textContent = '', 3000);
  }
}
setTimeout(() => document.getElementById('senha-input').focus(), 200);

carregar();
</script>
</body>
</html>
